<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mehta Family Holidays</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; text-align: center; padding: 40px 20px; color: #333; }
        h1 { color: #003366; margin-bottom: 10px; font-size: 2rem; }
        .subtitle { color: #666; margin-bottom: 40px; }
        .menu-container { max-width: 450px; margin: 0 auto; }
        .trip-card {
            background: white;
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            text-decoration: none;
            display: block;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }
        .trip-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.12); }
        .alaska { border-left: 10px solid #d35400; }
        .alaska .trip-name { color: #d35400; font-weight: bold; font-size: 1.3rem; display: block; }
        .tbd { border-left: 10px solid #bdc3c7; background: #fafafa; }
        .tbd .trip-name { color: #7f8c8d; font-weight: bold; font-size: 1.3rem; display: block; }
        .status { font-size: 0.9rem; display: block; margin-top: 8px; color: #555; }
        .chevron { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: #ccc; font-size: 1.5rem; }
    </style>
</head>
<body>
    <h1>🌍 Mehta Travel Portal</h1>
    <p class="subtitle">Our 2026 Expeditions & Adventures</p>
    <div class="menu-container">
        <a href="alaska.html" class="trip-card alaska">
            <span class="trip-name">🏔️ Alaska Expedition</span>
            <span class="status">May 28 - June 5, 2026</span>
            <span class="status" style="font-weight: bold; color: #27ae60;">● Confirmed & Booked</span>
            <span class="chevron">›</span>
        </a>
        <div class="trip-card tbd">
            <span class="trip-name">🌴 San Diego</span>
            <span class="status">Dates TBD</span>
            <span class="status">○ Planning Phase</span>
        </div>
        <div class="trip-card tbd">
            <span class="trip-name">🏖️ Goa</span>
            <span class="status">Dates TBD</span>
            <span class="status">○ Planning Phase</span>
        </div>
    </div>
    <footer style="margin-top: 60px; font-size: 0.8rem; color: #999;">Built for Alok, Aayu, Amaira, and Ariha.</footer>
</body>
</html>
